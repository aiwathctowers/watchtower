version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - goimports

linters:
  default: none
  enable:
    # Bugs & correctness
    - errcheck
    - govet
    - staticcheck
    - bodyclose
    - sqlclosecheck
    - gosec
    - exhaustive
    - nilerr
    - predeclared

    # Code quality
    - unconvert
    - ineffassign

    # Style & consistency
    - misspell
    - whitespace
    - dupword

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (*database/sql.Tx).Rollback
        - (*database/sql.Rows).Close
        - (io.Closer).Close
        - encoding/json.Unmarshal
        - (*os/exec.Cmd).Wait
        - (*github.com/spf13/viper.Viper).BindEnv
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Stmt).Close
        - (*net/http.Server).Close
        - (net.Listener).Close
        - (*encoding/json.Encoder).Encode
        - (net/http.ResponseWriter).Write
        - (*watchtower/internal/db.DB).RemoveWatch
        - os.Remove
        - (*net/http.Request).ParseForm
        - (*net/http.Server).Serve

    exhaustive:
      default-signifies-exhaustive: true

    gosec:
      excludes:
        - G104 # covered by errcheck
        - G101 # hardcoded credentials — test tokens only
        - G115 # integer overflow conversion — safe in CLI context
        - G120 # form parsing without limits — test HTTP servers only
        - G204 # subprocess with variable — expected in CLI tools
        - G301 # directory permissions > 0750 — expected for user data dirs
        - G302 # file permissions > 0600 — expected for certs/lock files
        - G304 # file path from variable — expected in CLI tools
        - G306 # WriteFile permissions — test scripts must be executable
        - G402 # TLS InsecureSkipVerify — used in test client for self-signed certs
        - G404 # weak random — acceptable for jitter/non-crypto use
        - G702 # command injection via taint — CLI tool builds commands from config
        - G703 # error not checked — covered by errcheck linter

    staticcheck:
      checks:
        - "all"
        - "-QF*"   # quick-fix suggestions are too noisy

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
