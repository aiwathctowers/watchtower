name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.11.4"
          args: --timeout=5m

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test
        run: go test ./... -race -count=1

      - name: Build
        run: go build ./...

  swift-lint:
    name: Swift Lint
    runs-on: macos-15
    defaults:
      run:
        working-directory: WatchtowerDesktop
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint

  swift-test:
    name: Swift Test
    runs-on: macos-15
    defaults:
      run:
        working-directory: WatchtowerDesktop
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  sentrux-quality:
    name: Sentrux Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sentrux
        run: curl -fsSL https://raw.githubusercontent.com/sentrux/sentrux/main/install.sh | sh

      # check enforces .sentrux/rules.toml (max_cc, max_fn_lines, no_god_files).
      - name: Architectural rules
        run: sentrux check .

      # gate blocks any structural regression vs .sentrux/baseline.json.
      - name: Structural regression gate
        run: sentrux gate .
