included:
  - Sources
  - Tests

excluded:
  - .build
  - Sources/Resources

# Strict rules
opt_in_rules:
  # Code quality
  - closure_body_length
  - closure_end_indentation
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Severity overrides — make warnings into errors
force_cast: error
force_try: error
force_unwrapping: error

# Rule configuration
line_length:
  warning: 150
  error: 300
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1500

type_body_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 6
  error: 30

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 3
  function_level: 3

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  allowed_symbols:
    - _
  excluded:
    - id
    - db
    - ts
    - i
    - x
    - y

large_tuple:
  warning: 4
  error: 6

closure_body_length:
  warning: 50
  error: 200

enum_case_associated_values_count:
  warning: 5
  error: 7

type_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 50
    error: 60

reporter: xcode
